# .github/workflows/telemetryos-ci.yml
# Minimal, fast compile gate for the TelemetryOS CI-reading gate (option B).
# - Runs on pull_request (so it fires on our PR branch) AND push.
# - `cargo check` only (no tests) → fast; the check-run name contains "cargo" so the
#   gate's build-check matcher picks it up.
# - rust-cache warms ~/.cargo + target/ so our fix-push re-runs are quick.
name: CI

on:
  push:
  pull_request:

jobs:
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
